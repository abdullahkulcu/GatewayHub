services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: gatewayhub
      POSTGRES_PASSWORD: gatewayhub
      POSTGRES_DB: gatewayhub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  app:
    build: ./backend
    env_file: .env
    depends_on:
      - postgres
      - redis
    ports:
      - "${APP_PORT:-8000}:8000"

volumes:
  postgres_data:
